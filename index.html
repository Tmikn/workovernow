<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宦想次元</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg-freedom: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --sidebar-bg: rgba(255, 255, 255, 0.95);
            --primary-color: #2575fc;
            --accent-color: #ff4757;
            --text-main: #2f3542;
            --text-sub: #747d8c;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background 0.8s ease;
            overflow-x: hidden;
        }

        body.freedom {
            background: var(--bg-freedom);
        }

        /* --- 悬浮菜单按钮 --- */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            color: var(--primary-color);
            transition: transform 0.2s;
        }

        .menu-btn:active { transform: scale(0.9); }

        /* --- 侧边栏及遮罩 --- */
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; z-index: 1001;
        }
        .sidebar-overlay.active { opacity: 1; pointer-events: auto; }

        .sidebar {
            position: fixed;
            top: 0; left: 0; width: 260px; height: 100vh;
            background: var(--sidebar-bg);
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1002;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex; flex-direction: column;
        }
        .sidebar.active { transform: translateX(0); }

        .sidebar-header {
            padding: 40px 20px 10px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-header h2 { margin: 0; font-size: 1.2rem; color: var(--primary-color); }
        .close-btn { background: none; border: none; font-size: 1.5rem; color: var(--text-sub); cursor: pointer; }

        .sidebar-section-title {
            padding: 15px 25px 5px;
            font-size: 0.75rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-nav { list-style: none; padding: 0; margin: 0; }
        .sidebar-nav li a {
            display: flex; align-items: center; padding: 12px 25px;
            color: var(--text-main); text-decoration: none; font-size: 0.95rem;
            transition: all 0.2s;
        }
        .sidebar-nav li a:hover { background: rgba(37, 117, 252, 0.1); color: var(--primary-color); padding-left: 30px; }
        .nav-icon { margin-right: 12px; font-size: 1.2rem; }

        /* --- 核心容器 --- */
        .app-container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        .glass-card {
            background-color: var(--card-bg); border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.4);
            padding: 24px; text-align: center; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }

        .timer-display { font-size: 3.5rem; font-weight: 800; color: var(--primary-color); margin: 10px 0; }
        .status-message { color: var(--accent-color); font-weight: 600; margin-bottom: 15px; }

        /* --- 游戏导航网格 & 特效按钮 --- */
        .nav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .nav-item {
            position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px 15px; background-color: var(--card-bg); border-radius: 20px;
            text-decoration: none; color: var(--text-main); font-weight: 600;
            border: 1px solid rgba(255,255,255,0.4); overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 强力特效按钮（柏青哥专属） */
        .nav-item.highlight {
            background: linear-gradient(135deg, #ffffff 0%, #f1f2f6 100%);
            border: 2px solid transparent;
            background-clip: padding-box;
            animation: breathe 2s infinite ease-in-out;
        }

        .nav-item.highlight::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(37, 117, 252, 0.3), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
            50% { transform: scale(1.03); box-shadow: 0 10px 25px rgba(37, 117, 252, 0.3); }
        }

        .nav-item:active { transform: scale(0.95); }
        .nav-item .nav-icon-large { font-size: 2.2rem; margin-bottom: 8px; }

        /* 底部统计 */
        .footer-stats { text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.8); margin-top: 10px; }
        .footer-stats span { font-weight: bold; color: #fff; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleSidebar()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>宦想次元</h2>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        
        <div class="sidebar-section-title">通用</div>
        <ul class="sidebar-nav">
            <li><a href="board.html"><span class="nav-icon">💬</span> 公共留言板</a></li>
            <li><a href="#"><span class="nav-icon">⚙️</span> 偏好设置</a></li>
        </ul>

        <div class="sidebar-section-title">小游戏</div>
        <ul class="sidebar-nav">
            <li><a href="game.html"><span class="nav-icon">🧀</span> 黄油入口</a></li>
        </ul>
    </div>

    <div class="app-container">
        <div class="glass-card">
            <div class="timer-header"><h1>距离下班还有</h1></div>
            <div class="timer-display" id="timer">00:00:00</div>
            <div class="status-message" id="message"></div>
            
            <div class="time-setting">
                <label for="endTime">设定目标时间</label>
                <input type="time" id="endTime" value="18:00">
            </div>
        </div>

        <div class="nav-grid">
            <a href="Pochinko.html" class="nav-item highlight">
                <div class="nav-icon-large">🎰</div>
                柏青哥
            </a>
            <a href="Kobe.html" class="nav-item">
                <div class="nav-icon-large">🚁</div>
                复活劳大
            </a>
            <a href="Tank.html" class="nav-item">
                <div class="nav-icon-large">🎮</div>
                坦克大战
            </a>
            <a href="cowboy.html" class="nav-item">
                <div class="nav-icon-large">🤠</div>
                慢拔out
            </a>
        </div>

        <div class="footer-stats">
            本站总访问量 <span id="busuanzi_site_pv">...</span> 次<br>
            您是今日第 <span id="busuanzi_today_pv">...</span> 位薪水小偷
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        const timerElement = document.getElementById('timer');
        const endTimeInput = document.getElementById('endTime');
        const messageElement = document.getElementById('message');
        const bodyElement = document.body;

        const savedTime = localStorage.getItem('offWorkTime_mobile');
        if (savedTime) endTimeInput.value = savedTime;

        function updateTimer() {
            const now = new Date();
            const [hours, minutes] = endTimeInput.value.split(':').map(Number);
            const targetDate = new Date();
            targetDate.setHours(hours, minutes, 0, 0);

            let diff = targetDate - now;
            if (diff <= 0) {
                timerElement.textContent = "00:00:00";
                messageElement.textContent = "✨ 立刻滚蛋！";
                bodyElement.classList.add('freedom');
                return;
            }
            bodyElement.classList.remove('freedom');
            messageElement.textContent = "";

            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff / 60000) % 60);
            const s = Math.floor((diff / 1000) % 60);
            const formattedTime = [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
            timerElement.textContent = formattedTime;
        }

        endTimeInput.addEventListener('change', () => {
            localStorage.setItem('offWorkTime_mobile', endTimeInput.value);
            updateTimer();
        });

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
    <script src="//cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>
</body>
</html>
