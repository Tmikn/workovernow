<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>下班倒计时 - 摸鱼导航</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg-freedom: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --sidebar-bg: rgba(255, 255, 255, 0.95);
            --primary-color: #2575fc;
            --accent-color: #ff4757;
            --text-main: #2f3542;
            --text-sub: #747d8c;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background 0.8s ease;
            overflow-x: hidden; /* 防止侧边栏出现时产生横向滚动条 */
        }

        body.freedom {
            background: var(--bg-freedom);
        }

        /* --- 悬浮菜单按钮 --- */
        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 1.2rem;
            color: var(--primary-color);
            transition: transform 0.2s;
        }

        .menu-btn:active {
            transform: scale(0.9);
        }

        /* --- 侧边栏及遮罩 --- */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1001;
        }

        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: var(--sidebar-bg);
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1002;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 40px 20px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-sub);
            cursor: pointer;
            padding: 0;
        }

        .sidebar-nav {
            list-style: none;
            padding: 20px 0;
            margin: 0;
            flex: 1;
        }

        .sidebar-nav li a {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .sidebar-nav li a:hover, .sidebar-nav li a:active {
            background: rgba(37, 117, 252, 0.1);
            color: var(--primary-color);
        }

        .sidebar-nav .nav-icon {
            font-size: 1.4rem;
            margin-right: 15px;
            margin-bottom: 0; /* 覆盖网格图标的底部间距 */
        }

        /* 核心容器 */
        .app-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px; /* 给顶部按钮留点空间 */
        }

        .glass-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
            padding: 24px;
            text-align: center;
        }

        /* 倒计时模块 */
        .timer-header h1 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-sub);
            margin: 0 0 5px 0;
            letter-spacing: 2px;
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: var(--primary-color);
            margin: 10px 0;
            text-shadow: 0 4px 15px rgba(37, 117, 252, 0.15);
        }

        .status-message {
            font-size: 1.1rem;
            min-height: 1.6em;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 15px;
        }

        .time-setting {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding-top: 15px;
            border-top: 1px dashed rgba(0,0,0,0.1);
        }

        .time-setting label {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        input[type="time"] {
            border: none;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            padding: 8px 16px;
            font-size: 1.1rem;
            font-family: inherit;
            color: var(--text-main);
            outline: none;
            width: 140px;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="time"]:focus {
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 2px var(--primary-color);
        }

        /* 游戏导航网格 */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
            background-color: var(--card-bg);
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
        }

        .nav-item:active, .nav-item:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
        }

        .nav-item .nav-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            margin-right: 0;
        }

        /* 底部统计 */
        .footer-stats {
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
            padding-bottom: var(--safe-area-bottom);
        }

        .footer-stats span {
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleSidebar()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>宦想次元</h2>
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <ul class="sidebar-nav">
            <li>
                <a href="board.html">
                    <span class="nav-icon">💬</span> 公共留言板
                </a>
            </li>
            <li>
                <a href="#">
                    <span class="nav-icon">⚙️</span> 偏好设置
                </a>
            </li>
        </ul>
    </div>

    <div class="app-container">
        <div class="glass-card">
            <div class="timer-header">
                <h1>距离下班还有</h1>
            </div>
            <div class="timer-display" id="timer">00:00:00</div>
            <div class="status-message" id="message"></div>
            
            <div class="time-setting">
                <label for="endTime">设定目标时间</label>
                <input type="time" id="endTime" value="18:00">
            </div>
        </div>

        <div class="nav-grid">
            <a href="game.html" class="nav-item">
                <div class="nav-icon">🧀</div>
                黄油入口
            </a>
            <a href="Kobe.html" class="nav-item">
                <div class="nav-icon">🚁</div>
                复活劳大
            </a>
            <a href="Tank.html" class="nav-item">
                <div class="nav-icon">🎮</div>
                坦克大战
            </a>
            <a href="cowboy.html" class="nav-item">
                <div class="nav-icon">🤠</div>
                慢拔out
            </a>
        </div>

        <div class="footer-stats">
            本站总访问量 <span id="busuanzi_site_pv">...</span> 次<br>
            您是今日第 <span id="busuanzi_today_pv">...</span> 位薪水小偷
        </div>
    </div>

    <script>
        // --- 侧边栏控制逻辑 ---
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // --- 倒计时核心逻辑 (保持不变) ---
        const timerElement = document.getElementById('timer');
        const endTimeInput = document.getElementById('endTime');
        const messageElement = document.getElementById('message');
        const bodyElement = document.body;

        const savedTime = localStorage.getItem('offWorkTime_mobile');
        if (savedTime) {
            endTimeInput.value = savedTime;
        }

        function updateTimer() {
            const now = new Date();
            const [hours, minutes] = endTimeInput.value.split(':').map(Number);
            
            const targetDate = new Date();
            targetDate.setHours(hours, minutes, 0, 0);

            let diff = targetDate - now;

            if (diff <= 0) {
                timerElement.textContent = "00:00:00";
                messageElement.textContent = "✨ 立刻滚蛋！";
                bodyElement.classList.add('freedom');
                document.title = "下班！";
                return;
            }

            bodyElement.classList.remove('freedom');
            messageElement.textContent = "";

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            const formattedTime = [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');

            timerElement.textContent = formattedTime;
            document.title = `${formattedTime} 下班`;
        }

        endTimeInput.addEventListener('change', () => {
            localStorage.setItem('offWorkTime_mobile', endTimeInput.value);
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
            updateTimer();
        });

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
    
    <script src="//cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js" defer></script>

</body>
</html>
