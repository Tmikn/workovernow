<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黑曼巴传奇</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            /* 使用 svh (Small Viewport Height) 确保在有工具栏的情况下也能全屏 */
            height: 100svh; 
            overflow: hidden;
            position: fixed; /* 防止橡皮筋回弹效果 */
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* 计分板 */
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 100; /* 确保在最前面 */
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        /* 呼吸灯边框效果 */
        #score-board {
            animation: board-glow 2s infinite;
        }

        @keyframes board-glow {
            0% { border-color: rgba(155, 64, 158, 0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
            50% { border-color: rgba(155, 64, 158, 0.8); box-shadow: 0 4px 20px rgba(155, 64, 158, 0.4); }
            100% { border-color: rgba(155, 64, 158, 0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        }

        /* 小提示文字样式 */
        .score-tip {
            font-size: 10px;
            color: #9B409E; /* 使用你角色的紫色 */
            font-weight: normal;
            margin-top: 2px;
            text-align: center;
            opacity: 0.8;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-3px); }
            60% { transform: translateY(-1px); }
        }

        /* 手机端适配：稍微缩小一点防止挡住投篮 */
        @media (max-width: 600px) {
            #score-board {
                padding: 8px 15px;
                font-size: 18px;
            }
            .score-tip { font-size: 9px; }
        }

        /* 手机端控制按钮区域 */
        #controls {
            position: absolute;
            /* env(safe-area-inset-bottom) 自动预留 iPhone 底部横条的高度 */
            bottom: calc(15px + env(safe-area-inset-bottom));
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 10;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .ctrl-btn {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.3); /* 调亮一点，看得更清 */
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            color: white;
            font-size: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            
             /* --- 核心兼容性属性 --- */
            -webkit-user-select: none;  /* Safari, Chrome, Opera */
            -moz-user-select: none;     /* Firefox */
            -ms-user-select: none;      /* Internet Explorer/Edge (旧版) */
            user-select: none;          /* 标准属性 (现代浏览器) */
            
            /* 额外保险：防止移动端长按弹出系统菜单 */
            -webkit-touch-callout: none;
        }

        .ctrl-btn:active, .ctrl-btn.active {
            background: rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
        }

        #back-btn {
            position: fixed;
            /* 放在按钮上方，避免重叠 */
            bottom: calc(100px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            z-index: 5;
        }

        /* 提示层 */
        #tutorial {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(0,0,0,0.3);
            text-align: center;
            pointer-events: none;
        }

        /* 排行 */
        #rank-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100000;
            display: flex; justify-content: center; align-items: center;
            color: #333;
        }
        .rank-content {
            background: white; padding: 20px; border-radius: 20px;
            width: 85%; max-width: 320px; text-align: center;
        }
        #rank-list { text-align: left; margin: 15px 0; max-height: 200px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
        #player-name { padding: 8px; width: 60%; border-radius: 5px; border: 1px solid #ccc; }
        .close-btn { margin-top: 15px; background: #eee; border: none; padding: 8px 20px; border-radius: 10px; }

    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">得分: <span id="score">0</span>
        <div class="score-tip">点击查看排行榜 🏆</div>
        </div>
        
        <div id="tutorial">
            电脑：方向键 ← → 移动，Z / X 旋转<br>
            手机：使用下方按钮
        </div>

        <div id="controls">
            <div class="btn-group">
                <div class="ctrl-btn" id="btn-left">←</div>
                <div class="ctrl-btn" id="btn-right">→</div>
            </div>
            <div class="btn-group">
                <div class="ctrl-btn" id="btn-rot-left">↺</div>
                <div class="ctrl-btn" id="btn-rot-right">↻</div>
            </div>
        </div>
    </div>

    <div id="rank-modal" style="display: none;">
        <div class="rank-content">
            <h3>🏆 排行榜</h3>
            <div id="rank-list">加载中...</div>
            
            <div id="submit-area">
                <hr>
                <p>本次得分: <span id="final-score">0</span></p>
                <input type="text" id="player-name" placeholder="输入你的大名" maxlength="10">
                <button onclick="submitScore()">上榜</button>
            </div>
            
            <button class="close-btn" onclick="closeRank()">返回游戏</button>
        </div>
    </div>

    <script>
        // 1. 物理引擎初始化
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Body = Matter.Body,
              Composite = Matter.Composite,
              Events = Matter.Events,
              Vector = Matter.Vector;

        // 创建引擎
        const engine = Engine.create();
        const world = engine.world;

        // 获取容器宽高
        const container = document.getElementById('game-container');
        let width = container.clientWidth;
        let height = container.clientHeight;

        // 创建渲染器
        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: width,
                height: height,
                wireframes: false, // 关闭线框模式，显示颜色
                background: '#f0f2f5'
            }
        });

        // 2. 创建游戏物体

        // --- 墙壁 ---
        const wallOptions = { isStatic: true, render: { fillStyle: '#999' } };
        const ground = Bodies.rectangle(width / 2, height + 50, width, 100, wallOptions);
        const leftWall = Bodies.rectangle(-50, height / 2, 100, height * 2, wallOptions);
        const rightWall = Bodies.rectangle(width + 50, height / 2, 100, height * 2, wallOptions);
        Composite.add(world, [ground, leftWall, rightWall]);

        // --- 玩家 (组合刚体) ---
        // 颜色提取自用户上传图片
        const headColor = '#A86A4B'; // 褐色
        const bodyColor = '#9B409E'; // 紫色

        function createPlayer() {
            // 头部 (圆形)
            const headRadius = 20;
            const head = Bodies.circle(0, -25, headRadius, {
                render: { fillStyle: headColor }
            });

            // 身体 (倒三角形)
            // Matter.js 的 polygon 默认是正多边形，我们需要调整顶点让它看起来像个倒三角
            // 这里用梯形模拟稍微好控制一点，或者直接用三角形
            const bodyPart = Bodies.trapezoid(0, 15, 50, 60, 1, {
                render: { fillStyle: '#9B409E' },
                angle: Math.PI // 旋转180度，让尖角朝下
            });
            
            // 组合起来 
            const player = Body.create({
                parts: [head, bodyPart],
                friction: 0.1,
                frictionAir: 0.05, // 增加空气阻力，让它不按键时容易停下
                restitution: 0.2, // 弹性
                density: 0.02, // 密度，影响重量
            });

            // 初始位置
            Body.setPosition(player, { x: width * 0.2, y: height - 100 });

            // 初始状态强制垂直，防止一出生就倒了
            Body.setAngle(player, 0);

            return player;
        }

        const player = createPlayer();
        Composite.add(world, player);

        // --- 篮球 ---
        let ball;
        function createBall() {
            if (ball) Composite.remove(world, ball);
            
            ball = Bodies.circle(width * 0.5, height * 0.5, 18, {
                restitution: 1.6, // 高弹性
                friction: 0.005,
                density: 0.004,
                render: {
                    fillStyle: '#e67e22',
                    strokeStyle: '#d35400',
                    lineWidth: 3
                },
                label: 'ball'
            });
            Composite.add(world, ball);
        }
        createBall();

        // --- 篮筐系统 ---
        let score = 0;
        const scoreEl = document.getElementById('score');

        // 篮筐位置
        const hoopX = width * 0.85;
        const hoopY = height * 0.4;

        function createHoop() {
            const rimColor = '#e74c3c';
            
            // 篮板
            const backboard = Bodies.rectangle(hoopX + 40, hoopY - 40, 10, 100, {
                isStatic: true,
                render: { fillStyle: '#ecf0f1' }
            });

            // 篮筐左边缘 (实体)
            const rimLeft = Bodies.circle(hoopX - 35, hoopY, 3, {
                isStatic: true,
                render: { fillStyle: rimColor }
            });

            // 篮筐右边缘 (实体)
            const rimRight = Bodies.circle(hoopX + 25, hoopY, 3, {
                isStatic: true,
                render: { fillStyle: rimColor }
            });

            // 篮网感应器 (不可见，用于检测进球)
            const netSensor = Bodies.rectangle(hoopX - 5, hoopY + 20, 40, 10, {
                isStatic: true,
                isSensor: true, // 传感器：只检测碰撞，不产生物理反应
                render: { visible: false }, // 调试时设为 true 可见
                label: 'sensor'
            });

            Composite.add(world, [backboard, rimLeft, rimRight, netSensor]);
        }
        createHoop();

        // 3. 交互逻辑

        // 输入状态
        const keys = {
            left: false,
            right: false,
            rotLeft: false,
            rotRight: false
        };  

        // 键盘监听
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') keys.left = true;
            if (e.key === 'ArrowRight') keys.right = true;
            if (e.key === 'ArrowUp' || e.key === 'z' || e.key === 'Z') keys.rotLeft = true;
            if (e.key === 'ArrowDown' || e.key === 'x' || e.key === 'X') keys.rotRight = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') keys.left = false;
            if (e.key === 'ArrowRight') keys.right = false;
            if (e.key === 'ArrowUp' || e.key === 'z' || e.key === 'Z') keys.rotLeft = false;
            if (e.key === 'ArrowDown' || e.key === 'x' || e.key === 'X') keys.rotRight = false;
        });

        // 触摸按钮监听
        function setupTouch(id, keyName) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; btn.classList.add('active'); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; btn.classList.remove('active'); });
            // 兼容鼠标点击测试
            btn.addEventListener('mousedown', () => { keys[keyName] = true; btn.classList.add('active'); });
            btn.addEventListener('mouseup', () => { keys[keyName] = false; btn.classList.remove('active'); });
        }

        setupTouch('btn-left', 'left');
        setupTouch('btn-right', 'right');
        setupTouch('btn-rot-left', 'rotLeft');
        setupTouch('btn-rot-right', 'rotRight');

        // 游戏循环逻辑
        Events.on(engine, 'beforeUpdate', () => {
            // 移动力度
            const moveForce = 0.01;
            const rotSpeed = 0.15;

            // 1. 定义篮筐中心位置（和你创建篮筐时的坐标一致）
            const hoopCenter = { x: hoopX - 5, y: hoopY }; 

            // 2. 磁力参数
            const attractionStrength = 0.001; // 吸力强度，不要调太大，否则会像磁铁一样吸死
            const attractionRange = 80;       // 触发吸附的半径距离

            // 3. 计算力
            const dX = hoopCenter.x - ball.position.x;
            const dY = hoopCenter.y - ball.position.y;
            const distance = Math.sqrt(dX * dX + dY * dY);

            // 左右移动 (直接施加水平力)
            if (keys.left) {
                Body.applyForce(player, player.position, { x: -moveForce, y: 0 });
            }
            if (keys.right) {
                Body.applyForce(player, player.position, { x: moveForce, y: 0 });
            }

            // 旋转控制 (直接设置角速度，手感更直接)
            if (keys.rotLeft) {
                Body.setAngularVelocity(player, -rotSpeed);
            } else if (keys.rotRight) {
                Body.setAngularVelocity(player, rotSpeed);
            }

            // 限制玩家不要飞太高
            if (player.position.y < 0) {
                Body.setPosition(player, { x: player.position.x, y: 0 });
                Body.setVelocity(player, { x: player.velocity.x, y: 0 });
            }
            
            // 保持玩家大致直立 (如果不按旋转键) - 这是一个可选的辅助功能
            // 如果你想增加难度，可以注释掉下面这段
            
            if (!keys.rotLeft && !keys.rotRight) {
                 Body.setAngularVelocity(player, player.angularVelocity * 0.9);
            }
            

            // 检查球是否出界 (重置)
            if (ball.position.y > height + 100 || ball.position.x > width + 100 || ball.position.x < -100) {
                // 延迟重置
                createBall();
            }
            
            // 如果球在范围内，且球正在向下掉（增加手感，防止球从下面被吸上去）
            if (distance < attractionRange && ball.velocity.y > 0) {
                // 计算归一化的方向向量
                const forceVector = {
                    x: (dX / distance) * attractionStrength,
                    y: (dY / distance) * attractionStrength
                };
                
                // 给球施加力
                Body.applyForce(ball, ball.position, forceVector);
                
                // (可选) 视觉反馈：吸附时球微微变色
                // ball.render.strokeStyle = '#fff';
            }
        });

        // 碰撞检测 (得分)
        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;

            for (let i = 0; i < pairs.length; i++) {
                const bodyA = pairs[i].bodyA;
                const bodyB = pairs[i].bodyB;

                // 检查是否是 球 和 传感器 的碰撞
                if ((bodyA.label === 'ball' && bodyB.label === 'sensor') || 
                    (bodyB.label === 'ball' && bodyA.label === 'sensor')) {
                    
                    // 简单的防抖动，防止一次进球算多次分（通过检查垂直速度判断球是往下落）
                    if (ball.velocity.y > 0) {
                        score += 1;
                        scoreEl.innerText = score;
                        
                        // 进球特效：球变绿
                        ball.render.fillStyle = '#2ecc71';
                        
                        // 1秒后生成新球
                        setTimeout(() => {
                            createBall();
                        }, 1000);
                    }
                }
            }
        });

        // 启动引擎
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // 窗口大小改变适配
        window.addEventListener('resize', () => {
            width = container.clientWidth;
            height = container.clientHeight;
            render.canvas.width = width;
            render.canvas.height = height;
            // 重新定位地面和墙壁 (简单起见，这里建议刷新页面，或者编写复杂的重定位逻辑)
            location.reload(); 
        });

        // 1. 初始化 Supabase (注意这里直接用 supabasejs 提供的 createClient)
        const supabaseUrl = 'db.tmikn.xyz';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuenJqZWR0cmp4Z2R2ZXJhY2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMzQxNjIsImV4cCI6MjA4NTkxMDE2Mn0.ZK5y7uGXJ-nqednVzK7wL1GTxmA4DQSq34IcO88GcgQ';

        // 这里的变量名建议改一下，避免和库名冲突
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey); 
        // 或者如果是直接引入的 CDN，通常是：
        // const _supabase = supabase.createClient(supabaseUrl, supabaseKey);


        // 游戏结束或点击得分板时触发
        function showRank() {
            document.getElementById('rank-modal').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
            loadRank();
        }

        // 2. 加载排行榜
        async function loadRank() {
            const listDiv = document.getElementById('rank-list');
            listDiv.innerHTML = "<div style='text-align:center'>黑曼巴祈祷中...</div>";

            const { data, error } = await _supabase
                .from('Leaderboard')
                .select('username, score')
                .order('score', { ascending: false })
                .limit(10);

            if (error) {
                listDiv.innerHTML = "<div style='color:red'>加载失败，请检查网络</div>";
                console.error(error);
                return;
            }

            let html = "";
            if (data.length === 0) {
                html = "<div style='text-align:center'>虚位以待，快来占领榜首！</div>";
            } else {
                data.forEach((item, index) => {
                    let medal = index === 0 ? "🥇 " : index === 1 ? "🥈 " : index === 2 ? "🥉 " : (index + 1) + ". ";
                    html += `<div class="rank-item">
                        <span>${medal}${item.username}</span>
                        <b>${item.score} 分</b>
                    </div>`;
                });
            }
            listDiv.innerHTML = html;
        }

        // 提交分数
        async function submitScore() {
            const nameInput = document.getElementById('player-name');
            const name = nameInput.value.trim();
            if (!name) return alert("请输入ID");

            const btn = document.querySelector('#submit-area button');
            btn.disabled = true;
            btn.innerText = "正在上榜...";

            const { error } = await _supabase
                .from('Leaderboard')
                .insert([{ username: name, score: score }]);

            if (error) {
                alert("数据库链接失败");
                btn.disabled = false;
                btn.innerText = "重试";
            } else {
                alert("排行榜已更新");
                nameInput.value = ""; // 清空输入框
                document.getElementById('submit-area').style.display = 'none';
                loadRank();
            }
        }

        function closeRank() {
            document.getElementById('rank-modal').style.display = 'none';
        }

        // 修改你原来的得分点击事件，点击得分可以看排行
        document.getElementById('score-board').onclick = showRank;

    </script>


</body>
</html>
