<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎰 心跳弹球</title>
    <style>
        body {
            margin: 0; padding: 15px; box-sizing: border-box;
            background-color: #1a1a2e; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            /* 手机适配DVH */
            height: 100vh; height: 100dvh; overflow: hidden;
            transition: background-color 0.1s;
        }
        body.fever-active { animation: feverBg 0.5s infinite alternate; }
        @keyframes feverBg { 0% { background-color: #2b0f2e; } 100% { background-color: #0f213e; } }

        #game-container {
            position: relative;
            /* 手机等比缩放适配 */
            width: 100%; max-width: 400px; aspect-ratio: 2 / 3; 
            max-height: calc(100dvh - 130px - env(safe-area-inset-bottom));
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            border-radius: 10px; overflow: hidden; background: #16213e;
            border: 4px solid #0f3460; transition: box-shadow 0.2s, border-color 0.2s;
        }
        #game-container.fever-active { box-shadow: 0 0 50px #ff007f, 0 0 100px #ff007f; border-color: #ff007f; }

        canvas { display: block; width: 100%; height: 100%; }
        
        #ui {
            position: absolute; top: 10px; left: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box;
            pointer-events: none; z-index: 10;
        }
        .score-board { font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        
        #fever-alert {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 50px; font-weight: bold; color: #ff007f;
            text-shadow: 0 0 20px #fff; pointer-events: none;
            z-index: 20; display: none; white-space: nowrap;
        }

        .controls {
            margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; 
            width: 100%; max-width: 400px; padding-bottom: env(safe-area-inset-bottom);
        }
        button {
            flex: 1; min-width: 80px; background-color: #e94560; color: white; border: none; padding: 12px 5px;
            font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 0 #9d2e40; transition: all 0.1s; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        button:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 2px 0 #9d2e40; }
        button:hover:not(:disabled) { background-color: #ff5e7a; }
        
        #drop-btn.fever-btn { background-color: #ff007f; box-shadow: 0 0 15px #ff007f; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        #buy-btn { background-color: #fca311; box-shadow: 0 4px 0 #a66a0b;}
        #buy-btn.can-buy { animation: pulse 0.5s infinite alternate; box-shadow: 0 0 15px rgba(252, 163, 17, 0.8); }

        #signin-btn { background-color: #9b59b6; box-shadow: 0 4px 0 #6c3d81;}
        #ad-btn { background-color: #4caf50; display: none; box-shadow: 0 4px 0 #2d6630;} 
        button:disabled { background-color: #444 !important; color: #888; cursor: not-allowed; box-shadow: 0 4px 0 #222; }

        #ad-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95);
            z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .ad-content { background: #222; padding: 20px; border-radius: 10px; text-align: center; border: 2px solid #fca311; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div class="score-board" style="color:#ffd700;">💰 <span id="score">0</span></div>
            <div class="score-board" style="color:#00ffff;">🔮 <span id="balls-left">20</span></div>
        </div>
        <div id="fever-alert">FEVER TIME!</div>
        <canvas id="pachinkoCanvas" width="400" height="600"></canvas>
    </div>

    <div class="controls">
        <button id="signin-btn">签到</button>
        <button id="drop-btn">发射(空格)</button>
        <button id="buy-btn" disabled>买球(-50)</button>
        <button id="ad-btn">广告(+5)</button>
    </div>

    <div id="ad-overlay">
        <div class="ad-content">
            <h2 style="margin-top:0; color:#fca311;">广告</h2>
            <div style="width:200px; height:100px; background:linear-gradient(45deg, #f0f, #00f); margin:15px auto; border-radius:5px; display:flex; align-items:center; justify-content:center; font-weight:bold; color:yellow;">一刀999！装备秒回收</div>
            <p>剩余时间: <span id="ad-timer" style="font-size: 24px;">3</span> 秒</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pachinkoCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const scoreEl = document.getElementById('score');
        const ballsLeftEl = document.getElementById('balls-left');
        const dropBtn = document.getElementById('drop-btn');
        const buyBtn = document.getElementById('buy-btn');
        const signinBtn = document.getElementById('signin-btn');
        const adBtn = document.getElementById('ad-btn');
        const adOverlay = document.getElementById('ad-overlay');
        const feverAlert = document.getElementById('fever-alert');
        const adTimerEl = document.getElementById('ad-timer'); // 之前漏了这行

        const CONFIG = {
            width: 400, height: 600,
            gravity: 0.16, friction: 0.992, bounce: 0.55,
            pegRadius: 3.5, ballRadius: 6.5,
            defaultBalls: 20, ballPrice: 50, adReward: 5, signinReward: 20,
            maxBallsOnScreen: 80, dropCooldown: 180 
        };

        let score = 0, ballsLeft = 0;
        let balls = [], pegs = [], slots = [], particles = [], floatingTexts = [];
        let bumpers = []; 
        let platform = { x: 155, y: 490, w: 90, h: 8, vx: 2.8 }; // 挡板微调

        // 【新增】发射器配置
        let gameTicks = 0;
        let launcher = {
            pivotX: 200, pivotY: 25, // 顶部中心
            length: 45, angle: 0,
            swingRange: Math.PI / 4, // 左右摇摆各45度
            swingSpeed: 0.04, // 摇摆速度
            color: '#e94560'
        };
        
        let isWatchingAd = false;
        let shakeTime = 0;
        let feverTimer = 0; 
        let lastDropTime = 0; 

        // 存档版本
        const STORAGE_VER = '_vB1';

        function loadState() {
            let savedScore = localStorage.getItem('pachinko_score' + STORAGE_VER);
            let savedBalls = localStorage.getItem('pachinko_balls' + STORAGE_VER);
            score = savedScore !== null ? parseInt(savedScore) : 0;
            ballsLeft = savedBalls !== null ? parseInt(savedBalls) : CONFIG.defaultBalls;
        }

        function saveState() {
            localStorage.setItem('pachinko_score' + STORAGE_VER, score);
            localStorage.setItem('pachinko_balls' + STORAGE_VER, ballsLeft);
        }

        function checkSignIn() {
            let lastSignIn = localStorage.getItem('pachinko_sign' + STORAGE_VER);
            let today = new Date().toDateString(); 
            signinBtn.disabled = (lastSignIn === today);
            if (signinBtn.disabled) signinBtn.innerText = "已签到";
            else signinBtn.innerText = `签到(+${CONFIG.signinReward})`;
        }

        function doSignIn() {
            let today = new Date().toDateString();
            localStorage.setItem('pachinko_sign' + STORAGE_VER, today);
            ballsLeft += CONFIG.signinReward;
            saveState(); checkSignIn(); updateUI();
            spawnFloatingText(`签到成功 +${CONFIG.signinReward}🔮`, 200, 300, '#00ffff', true);
            spawnParticles(200, 300, '#00ffff', 30);
        }

        function updateUI() {
            scoreEl.innerText = score; ballsLeftEl.innerText = ballsLeft;
            buyBtn.disabled = score < CONFIG.ballPrice;
            buyBtn.classList.toggle('can-buy', score >= CONFIG.ballPrice);

            if (feverTimer > 0) {
                dropBtn.disabled = false; dropBtn.innerText = "狂热射击!"; dropBtn.classList.add('fever-btn');
                adBtn.style.display = 'none'; dropBtn.style.display = 'inline-block';
            } else {
                dropBtn.innerText = "发射(空格)"; dropBtn.classList.remove('fever-btn');
                dropBtn.disabled = ballsLeft <= 0;
                // 广告按钮显示逻辑：彻底破产且场上无球
                let isBroke = score < CONFIG.ballPrice && ballsLeft <= 0 && balls.length === 0;
                adBtn.style.display = isBroke ? 'inline-block' : 'none';
                dropBtn.style.display = isBroke ? 'none' : 'inline-block';
            }
        }

        function initObstacles() {
            pegs = []; bumpers = [];
            const rows = 12, cols = 9, spacingX = 40, spacingY = 32, startX = 40, startY = 85;
            for (let row = 0; row < rows; row++) {
                let offset = (row % 2 === 0) ? 0 : spacingX / 2;
                for (let col = 0; col < (row % 2 === 0 ? cols : cols - 1); col++) {
                    let px = startX + col * spacingX + offset; let py = startY + row * spacingY;
                    // 让出炮台、红球和挡板路径
                    if (py < 120 && px > 160 && px < 240) continue; 
                    if (py > 220 && py < 300 && px > 150 && px < 250) continue; 
                    pegs.push({ x: px, y: py });
                }
            }
            // 【数值核心】赌狗流 Scheme B：中间红球门神，通道仅20px宽。
            bumpers.push({ x: 165, y: 260, radius: 25, bounce: 1.5, color: '#ff2e63', pulse: 0 });
            bumpers.push({ x: 235, y: 260, radius: 25, bounce: 1.5, color: '#ff2e63', pulse: 0 });
        }

        function initSlots() {
            slots = [];
            const types = ['normal', 'normal', 'normal', 'fever', 'normal', 'normal', 'normal'];
            // 【分数值修改】方案 B：外侧高分
            const pointsArr = [10, 60, 20, 'FE', 20, 60, 10]; 
            const colors = ['#4e89ae', '#ed6663', '#43658b', '#ff007f', '#43658b', '#ed6663', '#4e89ae'];
            const widths = [80, 45, 65, 20, 65, 45, 80]; 

            let currentX = 0;
            for (let i = 0; i < 7; i++) {
                slots.push({
                    x: currentX, y: CONFIG.height - 40,
                    width: widths[i], height: 40,
                    type: types[i], points: pointsArr[i], color: colors[i], flashTimer: 0
                });
                currentX += widths[i];
            }
        }

        function spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 1) * 6, life: 1.0, color: color, size: Math.random() * 2 + 1 });
            }
        }

        function spawnFloatingText(text, x, y, color, isBig) {
            floatingTexts.push({ text: text, x: x, y: y, life: 1.0, color: color, isBig: isBig });
        }

        function dropBall() {
            if (isWatchingAd) return;
            if (balls.length >= CONFIG.maxBallsOnScreen) return; 
            let now = Date.now();
            if (now - lastDropTime < CONFIG.dropCooldown) return;

            if (feverTimer <= 0) {
                if (ballsLeft <= 0) return;
                ballsLeft--;
                saveState();
            }
            
            lastDropTime = now; 
            updateUI(); 

            // 【发射逻辑】从发射器末端射出，速度方向由角度决定
            const launchSpeed = 6; 
            const startX = launcher.pivotX - Math.sin(launcher.angle) * launcher.length;
            const startY = launcher.pivotY + Math.cos(launcher.angle) * launcher.length;

            balls.push({
                x: startX, y: startY,
                vx: -Math.sin(launcher.angle) * launchSpeed + (Math.random()-0.5)*0.2, // 加点微小随机偏向
                vy: Math.cos(launcher.angle) * launchSpeed,
                color: feverTimer > 0 ? '#ff007f' : '#e2d810',
                r: feverTimer > 0 ? CONFIG.ballRadius * 0.8 : CONFIG.ballRadius // fever模式球变小防止拥堵
            });
        }

        function buyBall() {
            if (score >= CONFIG.ballPrice) { score -= CONFIG.ballPrice; ballsLeft++; saveState(); updateUI(); spawnFloatingText(`🔮 +1`, 200, platform.y - 20, '#fca311', false); }
        }

        function activateFever() {
            if(feverTimer <= 0) {
                document.body.classList.add('fever-active');
                gameContainer.classList.add('fever-active');
                feverAlert.style.display = 'block';
                // Fever开启时加快发射器摇摆速度
                launcher.swingSpeed = 0.08;
            }
            feverTimer = 330; 
            shakeTime = 30;
            updateUI();
        }

        function watchAd() {
            if (isWatchingAd) return;
            isWatchingAd = true; adOverlay.style.display = 'flex'; 
            let timeLeft = 3; adTimerEl.innerText = timeLeft;
            adOverlay.onclick = () => { spawnFloatingText("别急，看完", 200, 300, "#ff0", false); };
            let timerInterval = setInterval(() => {
                timeLeft--; adTimerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval); ballsLeft += CONFIG.adReward;
                    isWatchingAd = false; adOverlay.style.display = 'none'; adOverlay.onclick = null;
                    saveState(); updateUI(); spawnFloatingText(`🔮 +${CONFIG.adReward}`, 200, 300, '#4caf50', true);
                }
            }, 1000); 
        }

        function checkRectCollision(ball, rect) {
            let testX = ball.x; let testY = ball.y;
            if (ball.x < rect.x) testX = rect.x; else if (ball.x > rect.x + rect.w) testX = rect.x + rect.w;
            if (ball.y < rect.y) testY = rect.y; else if (ball.y > rect.y + rect.h) testY = rect.y + rect.h;
            let dx = ball.x - testX, dy = ball.y - testY;
            let distance = Math.sqrt(dx*dx + dy*dy);
            if (distance <= ball.r) {
                let nx = dx / distance || 0, ny = dy / distance || -1;
                ball.x = testX + nx * ball.r; ball.y = testY + ny * ball.r;
                let dotProduct = ball.vx * nx + ball.vy * ny;
                // 挡板增加水平排斥力和最低反弹力，绝对不卡
                let frictionX = (ball.vx - platform.vx * 0.8) * 0.05;
                ball.vx = (ball.vx - 2 * dotProduct * nx) * CONFIG.bounce - frictionX;
                ball.vy = (ball.vy - 2 * dotProduct * ny) * (CONFIG.bounce + 0.15);
                if(ball.vy > -1) ball.vy = -2 - Math.random(); // 强制弹开
                let rectCenter = rect.x + rect.w / 2;
                ball.vx += (ball.x < rectCenter ? -1 : 1);
            }
        }

        function update() {
            gameTicks++;
            // 【发射器摇摆逻辑】使用Sine函数实现平滑摇摆
            launcher.angle = Math.sin(gameTicks * launcher.swingSpeed) * launcher.swingRange;

            platform.x += platform.vx;
            if(platform.x < 30 || platform.x + platform.w > CONFIG.width - 30) platform.vx *= -1;

            if (feverTimer > 0) {
                feverTimer--;
                if (feverTimer <= 0) {
                    document.body.classList.remove('fever-active'); gameContainer.classList.remove('fever-active'); feverAlert.style.display = 'none';
                    launcher.swingSpeed = 0.04;
                    updateUI();
                }
            }

            // 球与球排斥碰撞
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let bi = balls[i], bj = balls[j];
                    let dx = bi.x - bj.x, dy = bi.y - bj.y;
                    let minDist = bi.r + bj.r;
                    if (dx*dx + dy*dy < minDist*minDist) {
                        let dist = Math.sqrt(dx*dx+dy*dy) || 1;
                        let nx = dx/dist, ny = dy/dist, overlap = (minDist-dist)/2;
                        bi.x += nx*overlap; bi.y += ny*overlap; bj.x -= nx*overlap; bj.y -= ny*overlap;
                        bi.vx += nx*0.1; bi.vy += ny*0.1; bj.vx -= nx*0.1; bj.vy -= ny*0.1;
                    }
                }
            }

            for (let i = balls.length - 1; i >= 0; i--) {
                let ball = balls[i];
                ball.vy += CONFIG.gravity;
                ball.vx *= CONFIG.friction; ball.vy *= CONFIG.friction;
                ball.x += ball.vx; ball.y += ball.vy;

                if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -CONFIG.bounce; } 
                else if (ball.x + ball.r > CONFIG.width) { ball.x = CONFIG.width - ball.r; ball.vx *= -CONFIG.bounce; }

                for (let peg of pegs) {
                    let dx = ball.x - peg.x, dy = ball.y - peg.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    let minDist = ball.r + CONFIG.pegRadius;
                    if (distance < minDist) {
                        let nx = dx / distance, ny = dy / distance, overlap = minDist - distance;
                        ball.x += nx * overlap; ball.y += ny * overlap;
                        let dotProduct = ball.vx * nx + ball.vy * ny;
                        ball.vx = (ball.vx - 2 * dotProduct * nx) * CONFIG.bounce;
                        ball.vy = (ball.vy - 2 * dotProduct * ny) * CONFIG.bounce;
                        ball.vx += (Math.random() - 0.5) * 0.4;
                    }
                }

                for (let bmp of bumpers) {
                    let dx = ball.x - bmp.x, dy = ball.y - bmp.y;
                    let distSq = dx*dx + dy*dy;
                    let minDist = ball.r + bmp.radius;
                    if (distSq < minDist*minDist) {
                        let distance = Math.sqrt(distSq);
                        let nx = dx / distance, ny = dy / distance;
                        ball.x = bmp.x + nx * minDist; ball.y = bmp.y + ny * minDist;
                        let dotProduct = ball.vx * nx + ball.vy * ny;
                        ball.vx = (ball.vx - 2 * dotProduct * nx) * bmp.bounce;
                        ball.vy = (ball.vy - 2 * dotProduct * ny) * bmp.bounce;
                        bmp.pulse = 10; spawnParticles(ball.x, ball.y, bmp.color, 4);
                    }
                }

                checkRectCollision(ball, platform);

                if (ball.y > CONFIG.height - 40) {
                    for (let slot of slots) {
                        if (ball.x > slot.x && ball.x < slot.x + slot.width) {
                            slot.flashTimer = 15;
                            if (slot.type === 'fever') {
                                spawnFloatingText(`狂热!`, ball.x, slot.y - 15, '#ff007f', true);
                                spawnParticles(ball.x, slot.y, '#ff007f', 40);
                                activateFever();
                            } else {
                                score += slot.points;
                                spawnFloatingText(`+${slot.points}💰`, ball.x, slot.y - 15, slot.points >= 60 ? '#ffd700' : '#00ffff', slot.points >= 60);
                                spawnParticles(ball.x, slot.y, slot.color, slot.points >= 60 ? 15 : 8);
                                shakeTime = slot.points >= 60 ? 10 : 0;
                            }
                            saveState(); break; 
                        }
                    }
                    balls.splice(i, 1);
                    updateUI(); 
                }
            }

            if (shakeTime > 0) shakeTime--;
            slots.forEach(s => { if(s.flashTimer > 0) s.flashTimer--; });
            bumpers.forEach(b => { if(b.pulse > 0) b.pulse--; });
            particles.forEach((p,i) => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.02; if(p.life <= 0) particles.splice(i,1); });
            floatingTexts.forEach((ft,i) => { ft.y -= 1.2; ft.life -= 0.015; if(ft.life <= 0) floatingTexts.splice(i,1); });
        }

        function draw() {
            ctx.clearRect(0, 0, CONFIG.width, CONFIG.height);
            ctx.save();
            if(shakeTime > 0) { ctx.translate((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6); }

            // 槽位
            for (let slot of slots) {
                ctx.fillStyle = slot.flashTimer > 0 ? '#ffffff' : slot.color;
                ctx.fillRect(slot.x, slot.y, slot.width, slot.height);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(slot.x, slot.y, slot.width, slot.height);
                ctx.fillStyle = '#fff'; ctx.font = slot.type === 'fever' ? 'bold 11px Arial' : 'bold 16px Arial';
                ctx.textAlign = 'center'; ctx.fillText(slot.points, slot.x + slot.width / 2, slot.y + 25);
            }

            // 挡板
            ctx.fillStyle = '#fca311'; ctx.fillRect(platform.x, platform.y, platform.w, platform.h);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(platform.x, platform.y, platform.w, platform.h);

            // 钉子
            ctx.fillStyle = '#a8d8ea';
            for (let peg of pegs) { ctx.beginPath(); ctx.arc(peg.x, peg.y, CONFIG.pegRadius, 0, Math.PI*2); ctx.fill(); }

            // Bumpers
            for (let bmp of bumpers) {
                let r = bmp.radius + (bmp.pulse > 0 ? 3 : 0); 
                ctx.fillStyle = bmp.pulse > 0 ? '#ffffff' : bmp.color;
                ctx.beginPath(); ctx.arc(bmp.x, bmp.y, r, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
            }

            // 【绘制发射器】
            ctx.save();
            ctx.translate(launcher.pivotX, launcher.pivotY);
            ctx.rotate(launcher.angle);
            // 炮管
            ctx.fillStyle = launcher.color;
            ctx.fillRect(-7, 0, 14, launcher.length);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
            ctx.strokeRect(-7, 0, 14, launcher.length);
            // 炮头
            ctx.beginPath(); ctx.arc(0, launcher.length, 10, 0, Math.PI);
            ctx.fillStyle = '#222'; ctx.fill(); ctx.stroke();
            // 底座
            ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2);
            ctx.fillStyle = '#0f3460'; ctx.fill(); ctx.stroke();
            ctx.restore();

            // 球
            for (let ball of balls) {
                ctx.fillStyle = feverTimer > 0 ? '#ff007f' : ball.color; 
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
                // 光晕
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath(); ctx.arc(ball.x - ball.r*0.3, ball.y - ball.r*0.3, ball.r/3, 0, Math.PI*2); ctx.fill();
            }

            // 粒子和文字
            for (let p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); }
            ctx.globalAlpha = 1.0;
            for(let ft of floatingTexts) {
                ctx.globalAlpha = ft.life; ctx.fillStyle = ft.color;
                ctx.font = ft.isBig ? 'bold 30px Arial' : 'bold 20px Arial';
                ctx.textAlign = 'center'; ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
                ctx.strokeText(ft.text, ft.x, ft.y); ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.globalAlpha = 1.0; ctx.restore();
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }

        signinBtn.onclick = doSignIn;
        buyBtn.onclick = buyBall;
        adBtn.onclick = watchAd;
        
        // 手机触摸和空格键逻辑
        let isPressing = false;
        function handleStart(e) { e.preventDefault(); if(!isPressing) { isPressing = true; dropBall(); if(feverTimer > 0) window.feverInterval = setInterval(dropBall, 10); } }
        function handleEnd() { isPressing = false; if(window.feverInterval) clearInterval(window.feverInterval); }  

        dropBtn.addEventListener('touchstart', handleStart);
        dropBtn.addEventListener('touchend', handleEnd);
        dropBtn.addEventListener('mousedown', handleStart);
        dropBtn.addEventListener('mouseup', handleEnd);
        dropBtn.addEventListener('mouseleave', handleEnd);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if(!isPressing) { isPressing = true; dropBall(); if(feverTimer > 0) window.feverInterval = setInterval(dropBall, 10); }
            } else if (e.code === 'KeyB') buyBall();
        });
        document.addEventListener('keyup', (e) => { if (e.code === 'Space') handleEnd(); });

        loadState(); checkSignIn(); initObstacles(); initSlots(); updateUI(); loop();
    </script>
</body>
</html>
