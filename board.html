<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公共留言板</title>
    <style>
        /* CSS 样式保持你原来的不变 */
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-sub: #65676b;
            --border-color: #e4e6eb;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--text-main);
        }

        .header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: var(--text-sub);
            /* 给格言加一点平滑切换的动画效果 */
            transition: opacity 0.5s ease;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .input-group {
            margin-bottom: 15px;
        }

        input[type="text"], textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-family: inherit;
            background-color: #f7f8fa;
            transition: all 0.3s;
            outline: none;
        }

        input[type="text"]:focus, textarea:focus {
            background-color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            background-color: #a0c3ec;
            cursor: not-allowed;
        }

        .messages-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            scroll-margin-top: 20px; 
        }

        .message-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .message-item {
            padding: 15px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .message-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .msg-name {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1rem;
        }

        .msg-time {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .msg-content {
            font-size: 1rem;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            color: var(--text-sub);
            padding: 20px 0;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed var(--border-color);
        }

        .btn-page {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .btn-page:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-page:disabled {
            background: #f0f2f5;
            color: #b0b3b8;
            cursor: not-allowed;
            border-color: #e4e6eb;
        }

        .page-info {
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 500;
            min-width: 60px;
            text-align: center;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>💬 B岛匿名板</h1>
            <p id="quote-text">人是会思考的芦苇</p>
        </div>

        <div class="post-card">
            <div class="input-group">
                <input type="text" id="author-name" placeholder="你的昵称（选填，默认匿名）" maxlength="15">
            </div>
            <div class="input-group">
                <textarea id="author-content" placeholder="留下你的暴论..." maxlength="300"></textarea>
            </div>
            <button id="btn-submit" class="btn-submit" onclick="submitMessage()">发布留言</button>
        </div>

        <div class="messages-card" id="messages-card">
            <ul id="message-list" class="message-list">
                <div class="loading">正在连接数据库...</div>
            </ul>
            
            <div id="pagination-container"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://db.tmikn.xyz'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhuenJqZWR0cmp4Z2R2ZXJhY2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzMzQxNjIsImV4cCI6MjA4NTkxMDE2Mn0.ZK5y7uGXJ-nqednVzK7wL1GTxmA4DQSq34IcO88GcgQ'; 

        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 关键修改 2：新建格言库 ---
        const quotes = [
            "人是会思考的芦苇。",
            "凡是可以说的东西，都可以说得清楚；对于不可说的东西，我们必须保持沉默。",
            "你跑在前面？——你是作为牧羊人，还是作为例外？第三种可能则是逃兵……第一个良心问题。",
            "你是真实的？还是仅仅是个戏子？是一个代表，还是被代表的东西本身？最后你或许只是一个戏子的仿制品……第二个良心问题。",
            "你是旁观者？还是动手干活的人？——抑或你是移开视线、掉头走开的人？……第三个良心问题。",
            "你想随行？或是走在前面？或是独自走开？……人必须知道自己想要什么，并且知道自己是在‘想要’。……第四个良心问题。",
            "有两样东西，我们愈经常愈持久地加以思索，它们就愈使心灵充满日新月异、有加无已的景仰和敬畏：在我之上的星空和居我心中的道德法则。",
            "人是目的，绝非手段。",
            "巧者劳而智者忧，无能者无所求。",
            "若你严阵以待，死神便不会到来，哈萨维。",
            "这里的事情总是那么糟糕。",
            "有谁曾为风暴束上枷锁，又有谁胆敢将雷霆关进囚笼？",
            "如果你将你内在的东西表达出来，它将拯救你；如果你不将你内在的东西表达出来，它将毁灭你。",
        ];

        // 随机替换格言的函数
        function setRandomQuote() {
            const quoteElement = document.getElementById('quote-text');
            const randomIndex = Math.floor(Math.random() * quotes.length);
            // 这里用一点小透明度动画让切换看起来更自然
            quoteElement.style.opacity = 0;
            setTimeout(() => {
                quoteElement.textContent = quotes[randomIndex];
                quoteElement.style.opacity = 1;
            }, 100);
        }

        let currentPage = 1;
        const PAGE_SIZE = 10; 

        function escapeHTML(str) {
            return str.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000); 

            if (diff < 60) return "刚刚";
            if (diff < 3600) return `${Math.floor(diff / 60)} 分钟前`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} 小时前`;
            
            const m = (date.getMonth() + 1).toString().padStart(2, '0');
            const d = date.getDate().toString().padStart(2, '0');
            const h = date.getHours().toString().padStart(2, '0');
            const min = date.getMinutes().toString().padStart(2, '0');
            return `${m}-${d} ${h}:${min}`;
        }

        async function fetchMessages(page = 1) {
            currentPage = page;
            const list = document.getElementById('message-list');
            list.innerHTML = '<div class="loading">正在加载留言...</div>';

            const from = (currentPage - 1) * PAGE_SIZE;
            const to = from + PAGE_SIZE - 1;

            try {
                const { data, error, count } = await _supabase
                    .from('messages')
                    .select('name, content, created_at', { count: 'exact' })
                    .order('created_at', { ascending: false })
                    .range(from, to);

                if (error) throw error;

                if (count === 0) {
                    list.innerHTML = '<div class="loading">暂无留言，快来抢沙发吧！</div>';
                    document.getElementById('pagination-container').innerHTML = ''; 
                    return;
                }

                list.innerHTML = ''; 
                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'message-item';
                    
                    const safeName = escapeHTML(item.name);
                    const safeContent = escapeHTML(item.content);
                    const timeStr = formatTime(item.created_at);

                    li.innerHTML = `
                        <div class="msg-header">
                            <span class="msg-name">${safeName}</span>
                            <span class="msg-time">${timeStr}</span>
                        </div>
                        <div class="msg-content">${safeContent}</div>
                    `;
                    list.appendChild(li);
                });

                renderPagination(count);

            } catch (err) {
                console.error('获取留言失败:', err);
                list.innerHTML = '<div class="loading" style="color: red;">网络开小差了，留言加载失败。</div>';
            }
        }

        function renderPagination(totalCount) {
            const totalPages = Math.ceil(totalCount / PAGE_SIZE) || 1;
            const container = document.getElementById('pagination-container');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = `
                <div class="pagination">
                    <button class="btn-page" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                        上一页
                    </button>
                    <span class="page-info">${currentPage} / ${totalPages}</span>
                    <button class="btn-page" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                        下一页
                    </button>
                </div>
            `;
        }

        function changePage(newPage) {
            fetchMessages(newPage);
            document.getElementById('messages-card').scrollIntoView({ behavior: 'smooth' });
        }

        async function submitMessage() {
            const nameInput = document.getElementById('author-name');
            const contentInput = document.getElementById('author-content');
            const btn = document.getElementById('btn-submit');

            let name = nameInput.value.trim() || "匿名用户";
            let content = contentInput.value.trim();

            if (!content) {
                alert("留下一句暴论再走吧！");
                contentInput.focus();
                return;
            }

            btn.innerText = "发布中...";
            btn.disabled = true;

            try {
                const { error } = await _supabase
                    .from('messages')
                    .insert([{ name: name, content: content }]);

                if (error) throw error;

                contentInput.value = '';
                await fetchMessages(1); 
                
            } catch (err) {
                console.error('发布失败:', err);
                alert("发布失败，请检查网络！");
            } finally {
                btn.innerText = "发布留言";
                btn.disabled = false;
            }
        }

        // --- 关键修改 3：初始化时同时加载格言和留言 ---
        window.addEventListener('DOMContentLoaded', () => {
            setRandomQuote();
            fetchMessages(1);
        });
    </script>
</body>
</html>
